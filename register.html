<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Kick & Flick Arena</title>
  <link rel="icon" type="image/jpeg" href="assets/images/kick_flick_logo.jpg">
  <style>
    :root {
      --primary-neon: #facc15;
      --bg-dark: #000000;
      --card-bg: rgba(10, 10, 10, 0.85);
      --text-main: #f8fafc;
    }
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
    }
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      background: url('assets/images/kick_flick_logo.jpg') no-repeat center center/cover;
      position: relative;
    }
    .login-container::before {
      content: "";
      position: absolute;
      top: 0; right: 0; bottom: 0; left: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1;
    }
    .login-box {
      position: relative;
      z-index: 2;
      background: var(--card-bg);
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      width: 100%;
      max-width: 400px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
    }
    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .login-header h2 {
      margin: 0 0 10px;
      font-size: 1.8rem;
    }
    .login-header p {
      margin: 0;
      color: #94a3b8;
      font-size: 0.95rem;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
      color: white;
      box-sizing: border-box;
      font-size: 1rem;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary-neon);
      box-shadow: 0 0 0 2px rgba(250, 204, 21, 0.2);
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 6px;
      background: var(--primary-neon);
      color: black;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 10px;
    }
    .btn-login:hover {
      background: #eab308;
    }
    .back-link, .register-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #cbd5e1;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back-link:hover, .register-link:hover {
      text-decoration: underline;
    }
    .register-link {
      margin-top: 15px;
      color: var(--primary-neon);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="login-header">
        <h2>Create an Account</h2>
        <p>Join Kick & Flick Arena</p>
      </div>
      <form id="registerForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="password">Password (min 6 characters)</label>
          <input type="password" id="password" placeholder="Create a password" required minlength="6">
        </div>
        <button type="submit" class="btn-login">Register Account</button>
      </form>
      <a href="login.html" class="register-link">Already have an account? Login here</a>
      <a href="index.html" class="back-link">&larr; Back to Home</a>
    </div>
  </div>

  <!-- Firebase Auth Logic -->
  <script type="module" src="js/firebase-auth.js"></script>
  <script type="module">
    document.addEventListener('DOMContentLoaded', () => {
      const registerForm = document.getElementById('registerForm');
      
      registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const submitBtn = registerForm.querySelector('.btn-login');
        
        try {
          submitBtn.textContent = 'Creating account...';
          submitBtn.disabled = true;
          
          // Wait for Firebase to load
          const auth = window.firebaseAuth;
          const { createUserWithEmailAndPassword, setPersistence, browserLocalPersistence } = window.firebaseAuthMethods;

          // Ensure it remembers the user
          await setPersistence(auth, browserLocalPersistence);
          
          // Register user
          await createUserWithEmailAndPassword(auth, email, password);
          
          // Redirect on success
          window.location.href = 'index.html';
          
        } catch (error) {
          console.error("Registration failed:", error.message);
          alert("Registration failed: " + error.message);
          submitBtn.textContent = 'Register Account';
          submitBtn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
