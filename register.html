<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Kick & Flick Arena</title>
  <link rel="icon" type="image/jpeg" href="assets/images/kick_flick_logo.jpg">
  <style>
    :root {
      --primary-neon: #facc15;
      --bg-dark: #000000;
      --card-bg: rgba(10, 10, 10, 0.85);
      --text-main: #f8fafc;
    }
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
    }
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      background: url('assets/images/kick_flick_logo.jpg') no-repeat center center/cover;
      position: relative;
    }
    .login-container::before {
      content: "";
      position: absolute;
      top: 0; right: 0; bottom: 0; left: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1;
    }
    .login-box {
      position: relative;
      z-index: 2;
      background: var(--card-bg);
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      width: 100%;
      max-width: 400px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
    }
    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .login-header h2 {
      margin: 0 0 10px;
      font-size: 1.8rem;
    }
    .login-header p {
      margin: 0;
      color: #94a3b8;
      font-size: 0.95rem;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
      color: white;
      box-sizing: border-box;
      font-size: 1rem;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary-neon);
      box-shadow: 0 0 0 2px rgba(250, 204, 21, 0.2);
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 6px;
      background: var(--primary-neon);
      color: black;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 10px;
    }
    .btn-login:hover {
      background: #eab308;
    }
    .btn-google {
      background: white;
      color: black;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .btn-google:hover {
      background: #f1f5f9;
    }
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 20px 0;
      color: #64748b;
      font-size: 0.85rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .divider::before { margin-right: 10px; }
    .divider::after { margin-left: 10px; }
    .back-link, .register-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #cbd5e1;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back-link:hover, .register-link:hover {
      text-decoration: underline;
    }
    .register-link {
      margin-top: 15px;
      color: var(--primary-neon);
    }
    
    /* Responsive Adaptations */
    @media (max-width: 480px) {
      .login-box {
        padding: 30px 20px;
        margin: 0 15px;
        width: calc(100% - 30px);
      }
      .login-header h2 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="login-header">
        <h2>Create an Account</h2>
        <p>Join Kick & Flick Arena</p>
      </div>

      <!-- Google Sign Up -->
      <button type="button" id="btnGoogleLogin" class="btn-login btn-google">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.16v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.16C1.43 8.55 1 10.22 1 12s.43 3.45 1.16 4.93l3.68-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.16 7.07l3.68 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Sign up with Google
      </button>

      <div class="divider">OR</div>

      <form id="registerForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="password">Password (min 6 characters)</label>
          <input type="password" id="password" placeholder="Create a password" required minlength="6">
        </div>
        <button type="submit" class="btn-login">Register Account</button>
      </form>
      <a href="login.html" class="register-link">Already have an account? Login here</a>
      <a href="index.html" class="back-link">&larr; Back to Home</a>
    </div>
  </div>

  <!-- Firebase Auth Logic -->
  <script type="module" src="js/firebase-auth.js"></script>
  <script type="module">
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const registerForm = document.getElementById('registerForm');
        const auth = window.firebaseAuth;
        const { createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, setPersistence, browserLocalPersistence, onAuthStateChanged } = window.firebaseAuthMethods;

        // --- AUTO-REDIRECT IF ALREADY LOGGED IN ---
        onAuthStateChanged(auth, (user) => {
          if (user) {
            window.location.href = 'index.html';
          }
        });

        // --- GOOGLE SIGN UP ---
        document.getElementById('btnGoogleLogin').addEventListener('click', async (e) => {
          e.preventDefault();
          try {
            await setPersistence(auth, browserLocalPersistence);
            const provider = new GoogleAuthProvider();
            await signInWithPopup(auth, provider);
            window.location.href = 'index.html';
          } catch (error) {
            console.error(error);
            alert("Google Sign Up failed: " + error.message);
          }
        });

        // --- EMAIL SIGN UP ---
        registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const submitBtn = registerForm.querySelector('.btn-login');
        
        try {
          submitBtn.textContent = 'Creating account...';
          submitBtn.disabled = true;

          // Ensure it remembers the user
          await setPersistence(auth, browserLocalPersistence);
          
          // Register user
          await createUserWithEmailAndPassword(auth, email, password);
          
          // Redirect on success
          window.location.href = 'index.html';
          
        } catch (error) {
          console.error("Registration failed:", error.message);
          alert("Registration failed: " + error.message);
          submitBtn.textContent = 'Register Account';
          submitBtn.disabled = false;
        }
      });
      }, 500); // short delay to ensure firebase script exports are ready
    });
  </script>
</body>
</html>
