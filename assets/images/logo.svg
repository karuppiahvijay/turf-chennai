<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <!-- Yellow to amber gradient -->
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#facc15;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter yellow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background pill shape - solid black -->
  <rect x="4" y="4" width="392" height="152" rx="20" ry="20" fill="#0a0a0a" stroke="#facc15" stroke-width="2"/>

  <!-- Subtle yellow glow layer -->
  <rect x="4" y="4" width="392" height="152" rx="20" ry="20" fill="#facc15" opacity="0.03"/>

  <!-- === K LETTER === -->
  <!-- Vertical bar of K -->
  <rect x="30" y="28" width="11" height="100" rx="4" fill="url(#yellowGrad)" filter="url(#glow)"/>
  <!-- Top diagonal of K -->
  <polygon points="41,78 92,28 108,28 57,78" fill="url(#yellowGrad)" filter="url(#glow)"/>
  <!-- Bottom diagonal of K -->
  <polygon points="41,82 92,128 108,128 57,82" fill="url(#yellowGrad)" filter="url(#glow)"/>

  <!-- Football inside K angle -->
  <circle cx="73" cy="78" r="11" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.55"/>
  <circle cx="73" cy="78" r="3" fill="#ffffff" opacity="0.4"/>
  <line x1="70" y1="73" x2="76" y2="83" stroke="#ffffff" stroke-width="1" opacity="0.35"/>
  <line x1="70" y1="76" x2="76" y2="76" stroke="#ffffff" stroke-width="1" opacity="0.35"/>
  <line x1="70" y1="83" x2="76" y2="73" stroke="#ffffff" stroke-width="1" opacity="0.35"/>

  <!-- Ampersand "&" -->
  <text x="118" y="100" font-family="'Georgia', serif" font-size="70" font-weight="900" fill="#facc15" filter="url(#glow)" opacity="0.9">&amp;</text>

  <!-- === F LETTER === -->
  <!-- Vertical bar of F -->
  <rect x="190" y="28" width="11" height="100" rx="4" fill="url(#yellowGrad)" filter="url(#glow)"/>
  <!-- Top horizontal bar of F -->
  <rect x="190" y="28" width="56" height="11" rx="4" fill="url(#yellowGrad)" filter="url(#glow)"/>
  <!-- Middle horizontal bar of F -->
  <rect x="190" y="71" width="43" height="9" rx="4" fill="url(#yellowGrad)" filter="url(#glow)"/>

  <!-- Cricket bat inside F -->
  <rect x="232" y="57" width="7" height="30" rx="3" fill="#ffffff" opacity="0.5"/>
  <ellipse cx="235" cy="55" rx="7" ry="9" fill="#ffffff" opacity="0.4"/>
  <!-- Cricket ball -->
  <circle cx="250" cy="82" r="7" fill="none" stroke="#facc15" stroke-width="1.8" opacity="0.75"/>
  <line x1="245" y1="80" x2="255" y2="84" stroke="#facc15" stroke-width="1" opacity="0.5"/>

  <!-- Volleyball top right of F -->
  <circle cx="256" cy="36" r="13" fill="none" stroke="#fde68a" stroke-width="2" filter="url(#glow)"/>
  <path d="M243,36 Q256,24 269,36" fill="none" stroke="#fde68a" stroke-width="1.2" opacity="0.65"/>
  <path d="M243,36 Q256,48 269,36" fill="none" stroke="#fde68a" stroke-width="1.2" opacity="0.65"/>
  <line x1="256" y1="23" x2="256" y2="49" stroke="#fde68a" stroke-width="1.2" opacity="0.65"/>

  <!-- Vertical divider -->
  <line x1="286" y1="28" x2="286" y2="128" stroke="#facc15" stroke-width="1.5" opacity="0.25"/>

  <!-- Right side brand text -->
  <text x="300" y="68" font-family="'Arial Black', 'Arial', sans-serif" font-size="22" font-weight="900" letter-spacing="2" fill="#ffffff" filter="url(#glow)">KICK &amp; FLICK</text>

  <!-- Tagline ARENA in yellow -->
  <text x="300" y="90" font-family="'Arial', sans-serif" font-size="11" font-weight="600" letter-spacing="5" fill="#facc15" opacity="0.95">ARENA</text>

  <!-- Location in faint amber -->
  <text x="300" y="108" font-family="'Arial', sans-serif" font-size="9" fill="#fde68a" opacity="0.6" letter-spacing="1">📍 ERNAVOOR, CHENNAI</text>

  <!-- Yellow underline accent -->
  <rect x="300" y="114" width="88" height="2" rx="1" fill="url(#yellowGrad)" opacity="0.55"/>

  <!-- Sport icons -->
  <text x="300" y="135" font-family="'Arial', sans-serif" font-size="14" fill="#ffffff" opacity="0.45" letter-spacing="4">⚽  🏏  🏐</text>
</svg>
