<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Kick & Flick Arena</title>
  <link rel="icon" type="image/jpeg" href="assets/images/kick_flick_logo.jpg">
  <style>
    :root {
      --primary-neon: #facc15;
      --bg-dark: #000000;
      --card-bg: rgba(10, 10, 10, 0.85);
      --text-main: #f8fafc;
    }
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
    }
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      background: url('assets/images/kick_flick_logo.jpg') no-repeat center center/cover;
      position: relative;
    }
    .login-container::before {
      content: "";
      position: absolute;
      top: 0; right: 0; bottom: 0; left: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1;
    }
    .login-box {
      position: relative;
      z-index: 2;
      background: var(--card-bg);
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
      width: 100%;
      max-width: 400px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
    }
    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .login-header h2 {
      margin: 0 0 10px;
      font-size: 1.8rem;
    }
    .login-header p {
      margin: 0;
      color: #94a3b8;
      font-size: 0.95rem;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
      color: white;
      box-sizing: border-box;
      font-size: 1rem;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary-neon);
      box-shadow: 0 0 0 2px rgba(250, 204, 21, 0.2);
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 6px;
      background: var(--primary-neon);
      color: black;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 10px;
    }
    .btn-login:hover {
      background: #eab308;
    }
    .btn-google {
      background: white;
      color: black;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .btn-google:hover {
      background: #f1f5f9;
    }
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 20px 0;
      color: #64748b;
      font-size: 0.85rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .divider::before { margin-right: 10px; }
    .divider::after { margin-left: 10px; }
    
    .back-link, .register-link, .toggle-link {
      display: block;
      text-align: center;
      margin-top: 15px;
      color: #cbd5e1;
      text-decoration: none;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .back-link:hover, .register-link:hover, .toggle-link:hover {
      text-decoration: underline;
    }
    .register-link {
      color: var(--primary-neon);
    }
    #phone-form-section {
      display: none;
    }
    
    @media (max-width: 480px) {
      .login-box {
        padding: 30px 20px;
        margin: 0 15px;
        width: calc(100% - 30px);
      }
      .login-header h2 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="login-header">
        <h2>Welcome Back</h2>
        <p>Sign in to your Kick & Flick account</p>
      </div>

      <!-- Google Login -->
      <button id="btnGoogleLogin" class="btn-login btn-google">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.16v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.16C1.43 8.55 1 10.22 1 12s.43 3.45 1.16 4.93l3.68-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.16 7.07l3.68 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Sign in with Google
      </button>

      <div class="divider">OR</div>

      <!-- Email Login Form -->
      <div id="email-form-section">
        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" required>
          </div>
          <button type="submit" class="btn-login" id="btnEmailLogin">Login with Email</button>
        </form>
        <div class="toggle-link" id="toggleToPhone">Log in with Mobile Number instead</div>
      </div>

      <!-- Phone Login Form -->
      <div id="phone-form-section">
        <form id="phoneForm">
          <div class="form-group">
            <label for="phoneNumber">Mobile Number (with Country Code)</label>
            <input type="tel" id="phoneNumber" placeholder="+91 98765 43210" required>
          </div>
          <div id="recaptcha-container"></div>
          <button type="submit" class="btn-login" id="btnSendOtp">Send OTP</button>
        </form>
        
        <form id="otpForm" style="display: none; margin-top: 20px;">
          <div class="form-group">
            <label for="otpCode">Enter OTP</label>
            <input type="text" id="otpCode" placeholder="123456" required>
          </div>
          <button type="submit" class="btn-login" id="btnVerifyOtp">Verify & Login</button>
        </form>
        <div class="toggle-link" id="toggleToEmail">Log in with Email instead</div>
      </div>

      <a href="register.html" class="register-link">Don't have an account? Register here</a>
      <a href="index.html" class="back-link">&larr; Back to Home</a>
    </div>
  </div>

  <script type="module" src="js/firebase-auth.js"></script>
  <script type="module">
    document.addEventListener('DOMContentLoaded', () => {
      // Toggles
      const emailSection = document.getElementById('email-form-section');
      const phoneSection = document.getElementById('phone-form-section');
      
      document.getElementById('toggleToPhone').addEventListener('click', () => {
        emailSection.style.display = 'none';
        phoneSection.style.display = 'block';
      });
      document.getElementById('toggleToEmail').addEventListener('click', () => {
        phoneSection.style.display = 'none';
        emailSection.style.display = 'block';
      });

      // Firebase Methods setup
      setTimeout(() => {
        const auth = window.firebaseAuth;
        const { 
          signInWithEmailAndPassword, 
          GoogleAuthProvider, 
          signInWithPopup, 
          RecaptchaVerifier, 
          signInWithPhoneNumber,
          setPersistence, 
          browserLocalPersistence 
        } = window.firebaseAuthMethods;

        // --- GOOGLE LOGIN ---
        document.getElementById('btnGoogleLogin').addEventListener('click', async () => {
          try {
            await setPersistence(auth, browserLocalPersistence);
            const provider = new GoogleAuthProvider();
            await signInWithPopup(auth, provider);
            window.location.href = 'index.html';
          } catch (error) {
            console.error(error);
            alert("Google Login failed: " + error.message);
          }
        });

        // --- EMAIL LOGIN ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          const email = document.getElementById('email').value;
          const password = document.getElementById('password').value;
          const btn = document.getElementById('btnEmailLogin');
          
          try {
            btn.textContent = 'Logging in...';
            btn.disabled = true;
            await setPersistence(auth, browserLocalPersistence);
            await signInWithEmailAndPassword(auth, email, password);
            window.location.href = 'index.html';
          } catch (error) {
            console.error(error);
            alert("Login failed: " + error.message);
            btn.textContent = 'Login with Email';
            btn.disabled = false;
          }
        });

        // --- PHONE LOGIN ---
        let confirmationResult = null;
        
        // Setup Recaptcha
        if (!window.recaptchaVerifier) {
          window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
            'size': 'invisible'
          });
        }

        document.getElementById('phoneForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          const phoneNumber = document.getElementById('phoneNumber').value;
          const btn = document.getElementById('btnSendOtp');
          
          try {
            btn.textContent = 'Sending...';
            btn.disabled = true;
            
            const appVerifier = window.recaptchaVerifier;
            confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, appVerifier);
            
            // Hide phone form, show OTP form
            document.getElementById('phoneForm').style.display = 'none';
            document.getElementById('otpForm').style.display = 'block';
            
          } catch (error) {
            console.error(error);
            alert("Failed to send OTP: " + error.message);
            btn.textContent = 'Send OTP';
            btn.disabled = false;
          }
        });

        document.getElementById('otpForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          const otpCode = document.getElementById('otpCode').value;
          const btn = document.getElementById('btnVerifyOtp');
          
          try {
            btn.textContent = 'Verifying...';
            btn.disabled = true;
            await setPersistence(auth, browserLocalPersistence);
            await confirmationResult.confirm(otpCode);
            window.location.href = 'index.html';
          } catch (error) {
            console.error(error);
            alert("Invalid OTP: " + error.message);
            btn.textContent = 'Verify & Login';
            btn.disabled = false;
          }
        });

      }, 500); // short delay to ensure firebase script exports are ready
    });
  </script>
</body>
</html>
