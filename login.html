<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Kick & Flick Arena</title>
  <style>
    :root {
      --primary-neon: #22c55e;
      --bg-dark: #0f172a;
      --card-bg: rgba(15, 23, 42, 0.85);
      --text-main: #f8fafc;
    }
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
    }
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      /* Use the new logo/image as the background */
      background: url('assets/images/kick_flick_logo.jpg') no-repeat center center/cover;
      position: relative;
    }
    /* Dark overlay to make the login box pop and text readable */
    .login-container::before {
      content: "";
      position: absolute;
      top: 0; right: 0; bottom: 0; left: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1;
    }
    .login-box {
      position: relative;
      z-index: 2;
      background: var(--card-bg);
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      width: 100%;
      max-width: 400px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
    }
    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .login-header h2 {
      margin: 0 0 10px;
      font-size: 1.8rem;
    }
    .login-header p {
      margin: 0;
      color: #94a3b8;
      font-size: 0.95rem;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
      color: white;
      box-sizing: border-box;
      font-size: 1rem;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary-neon);
      box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2);
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 6px;
      background: var(--primary-neon);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 10px;
    }
    .btn-login:hover {
      background: #16a34a;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #cbd5e1;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="login-header">
        <h2>Welcome Back</h2>
        <p>Sign in to your Kick & Flick account</p>
      </div>
      <form action="index.html" method="GET">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn-login">Login to Dashboard</button>
      </form>
      <a href="index.html" class="back-link">&larr; Back to Home</a>
    </div>
  </div>
</body>
</html>
